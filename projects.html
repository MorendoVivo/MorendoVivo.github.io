<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | MorendoVivo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="mvlogo2.png" sizes="32x32">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="mvlogo2.png" alt="MorendoVivo logo" class="site-logo">
                <span>MorendoVivo</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="work.html">Work</a>
            </div>
        </div>
    </nav>

    <header class="hero-text">
        <h1>Project Collection</h1>
        <p class="tag">Collection of long form projects</p>
        <nav class="nav">
            <a class="btn" href="assets.html">Asset Collection</a>
            <a class="btn" href="index.html">Home</a>
        </nav>
    </header>

    <div id="projects"></div>

    <script>
        const projects = [
            {
                title: "Mood and Colour Exploration",
                description: "This was from a college project based around lighting, staging and how altering these could effect a viewers emotion.",
                src: "https://docs.google.com/document/d/e/2PACX-1vQgYiTwsCtrMFxc_2GF1JsARMlaLSvE7LXK33L9v1H0W99odE8UDtpitTtCFJ1kaDpxCDRpcg_s2vd8/pub?embedded=true"
            },
            {
                title: "Cuphead Character Project",
                description: "This was a smaller college project where I delved into the artstyle of 'Cuphead', creating my own character designs and colour schemes based on the 1930s rubber hose animation style.",
                src: "https://docs.google.com/document/d/e/2PACX-1vSdr_k7cfsPBKFJFq9G8bxh0tCH6vqSfTKn9czE4YZlL5rgtMA0kUSnsrOyVub85JxT1JCD_4xZcHPz/pub?embedded=true"
            }
        ];

        const container = document.getElementById("projects");

        projects.forEach(project => {
            const section = document.createElement("section");
            section.className = "project";

            section.innerHTML = `
                <h2>${project.title}</h2>
                <p>${project.description}</p>
                <iframe src="${project.src}" loading="lazy"></iframe>
                <div class="project-actions">
                    <a class="btn" href="${project.src}" target="_blank" rel="noopener">Open full screen</a>
                </div>
            `;

            container.appendChild(section);
        });
    </script>

    <script>
        // Navbar scroll effect
        // Navbar hide on scroll down, show on scroll up
        const navbar = document.querySelector('.navbar');
        let lastScrollY = 0;

        window.addEventListener('scroll', function() {
            const currentScrollY = window.scrollY;
            
            // Add backdrop effect when scrolled
            if (currentScrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
            
            // Hide navbar when scrolling down, show when scrolling up
            if (currentScrollY > lastScrollY && currentScrollY > 100) {
                // Scrolling down
                navbar.classList.add('hidden');
            } else {
                // Scrolling up
                navbar.classList.remove('hidden');
            }
            
            lastScrollY = currentScrollY;
        });
    </script>
</body>
</html>
