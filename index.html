<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MorendoVivo</title>
    <link rel="icon" type="image/x-icon" href="mvlogo2.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <img src="mvlogo2.png" alt="MorendoVivo logo" class="site-logo">
                <span>MorendoVivo</span>
            </a>
            <div class="nav-links">
                <a href="#games">Games</a>
                <a href="about.html">About</a>
                <a href="#contact">Contact</a>
                <a href="work.html">Work</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="assets/video/BASTILLEHEADERVIDEO.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1>BASTILLE</h1>
            <p>The flagship project of MorendoVivo</p>
            <a href="assets/games/bastille.html" class="cta">Explore the Game</a>
        </div>
    </header>


    <section id="games" class="games">
        <h2>Our Games</h2>
        <div class="game-grid">
            <a href="assets/games/bastille.html" class="game-card">
                <img src="assets/games/ELLISTESTRENDER.png" alt="Bastille game screenshot">
                <div class="game-overlay">
                    <h3>BASTILLE</h3>
                    <p>Flagship Project</p>
                </div>
            </a>
            <a href="assets/games/noom.html" class="game-card">
                <img src="assets/games/NoomCover.png" alt="Noom's Moon Train game screenshot">
                <div class="game-overlay">
                    <h3>Noom's Moon Train</h3>
                </div>
            </a>
        </div>
    </section>

    <script>
        // Navbar hide on scroll down, show on scroll up
        const navbar = document.querySelector('.navbar');
        let lastScrollY = 0;

        window.addEventListener('scroll', function() {
            const currentScrollY = window.scrollY;
            
            // Add backdrop effect when scrolled
            if (currentScrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
            
            // Hide navbar when scrolling down, show when scrolling up
            if (currentScrollY > lastScrollY && currentScrollY > 100) {
                // Scrolling down
                navbar.classList.add('hidden');
            } else {
                // Scrolling up
                navbar.classList.remove('hidden');
            }
            
            lastScrollY = currentScrollY;
        });

        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
